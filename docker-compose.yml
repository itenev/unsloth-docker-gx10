name: unsloth-gx10

services:
  unsloth-studio:
    image: unsloth-gx10:latest
    container_name: unsloth-studio
    restart: unless-stopped

    # ── Entrypoint + command ──────────────────────────────────────────────────
    entrypoint: ["/bin/sh", "-c",
      "exec /root/.local/share/uv/python/${UV_PYTHON_VERSION}/bin/python3.13 \"$@\"",
      "--"]
    command: [
      "/root/.unsloth/studio/unsloth_studio/bin/unsloth",
      "studio", "-H", "0.0.0.0", "-p", "8000"
    ]

    # ── GPU ───────────────────────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ── PyTorch / CUDA runtime requirements ───────────────────────────────────
    ipc: host
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864

    # ── Ports ─────────────────────────────────────────────────────────────────
    ports:
      - "8000:8000"
      - "8888:8888"

    environment:
      LLAMA_ARG_N_GPU_LAYERS: "-1"
      LLAMA_ARG_FLASH_ATTN: "1"
      HF_HOME: "/workspace/.cache/huggingface"
      PYTHONPATH: "/root/.unsloth/studio/unsloth_studio/lib/python3.13/site-packages"
      VIRTUAL_ENV: "/root/.unsloth/studio/unsloth_studio"

    volumes:
      # Persistent work directory
      - ./work:/workspace/work

      # HuggingFace model cache
      - hf-cache:/workspace/.cache/huggingface

      # Existing GGUF models
      - type: bind
        source: ${HOME}/models
        target: /workspace/models
        read_only: true

      # Auth DB — preserves login credentials across restarts
      - unsloth-auth:/root/.unsloth/studio/auth

      # ── SM_121 GPU-compiled llama.cpp ─────────────────────────────────────
      # Mounts the host-compiled CUDA binary over the CPU-only binary baked
      # into the image during docker build (build has no GPU access).
      # Built on host with: -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=121
      - type: bind
        source: ${HOME}/llama.cpp/build-gpu/bin
        target: /root/.unsloth/llama.cpp/build/bin
        read_only: true

volumes:
  hf-cache:
    name: unsloth-hf-cache
  unsloth-auth:
    name: unsloth-studio-auth
